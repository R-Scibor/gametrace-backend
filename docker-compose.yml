services:
  db:
    image: postgres:15-alpine
    container_name: gametrace_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gametrace_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gametrace_pass}
      POSTGRES_DB: ${POSTGRES_DB:-gametrace_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gametrace_user} -d ${POSTGRES_DB:-gametrace_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gametrace_redis
    restart: always

  alembic_init:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: gametrace_alembic_init
    command: alembic upgrade head
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: gametrace_api
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8010 --reload
    ports:
      - "8010:8010"
    volumes:
      - .:/app # Hot-reload kodu
      - covers_data:/app/covers # Wolumen na okładki CUSTOM
      - ./credentials/firebase-cred.json:/app/credentials/firebase-cred.json:ro
    env_file:
      - .env
    depends_on:
      alembic_init:
        condition: service_completed_successfully
      redis:
        condition: service_started

  bot:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: gametrace_bot
    restart: always
    command: python -m app.bot.main
    env_file:
      - .env
    depends_on:
      alembic_init:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: gametrace_celery_worker
    restart: always
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - ./credentials/firebase-cred.json:/app/credentials/firebase-cred.json:ro
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: gametrace_celery_beat
    restart: always
    command: celery -A app.core.celery_app beat --loglevel=info
    volumes:
      - ./credentials/firebase-cred.json:/app/credentials/firebase-cred.json:ro
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  flower:
    image: mher/flower:2.0
    container_name: gametrace_flower
    restart: always
    # Variable is renamed to GAMETRACE_FLOWER_AUTH so the mher image does not
    # auto-pick it up — empty FLOWER_BASIC_AUTH triggers a broken 401 mode.
    # Only add --basic-auth=... when the value is non-empty.
    entrypoint: ["sh", "-c"]
    command:
      - >
        if [ -n "$$GAMETRACE_FLOWER_AUTH" ]; then
          exec celery flower --basic-auth="$$GAMETRACE_FLOWER_AUTH";
        else
          exec celery flower;
        fi
    environment:
      CELERY_BROKER_URL: ${REDIS_URL:-redis://redis:6379/0}
      GAMETRACE_FLOWER_AUTH: ${FLOWER_BASIC_AUTH:-}
      FLOWER_PORT: "5555"
    # Uncomment for direct local-dev access. In a homelab, prefer routing
    # through Nginx Proxy Manager so Flower stays off the public port.
    # ports:
    #   - "5555:5555"
    depends_on:
      redis:
        condition: service_started

volumes:
  postgres_data:
  covers_data:
